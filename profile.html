<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profile</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/profile.css">
</head>
<body>
<div class="container-box">
<h2>Profile</h2>
<div id="msg"></div>
<input type="number" id="age" class="form-control mb-3" placeholder="Age">
<input type="text" id="dob" class="form-control mb-3" placeholder="DD-MM-YYYY" maxlength="10" oninput="formatDob()" inputmode="numeric">
<input type="text" id="contact" class="form-control mb-3" placeholder="Contact (10 digits)" inputmode="numeric">
<button onclick="updateProfile()" class="btn btn-primary w-100 mb-2">Update</button>
<button onclick="logout()" class="btn btn-danger w-100 mb-2">Logout</button>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="./js/profile.js?v=7"></script>
</body>
</html>
